<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact information Rafting Huanuco</title>
    <meta name="description"
      content="It is a page dedicated to guide to our costumer to have all the necesary information related our service and company.">
    <meta name="author" content="Anhelo Charle Yauri Valentin">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="bar">
        <img src="images/logo.jpeg" alt="Logo">
        <nav class="bottoms"> <!--nav>ul>li*4>a*/-->
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="hero">
            <img src="images/background.webp" alt="Background">
            <h1>Huanuco Rafting</h1>
            <article>
                <img src="images/customers.webp" alt="customers">
                <p> Los Cipreces Mz A Lt 9, Huanuco Peru - 978824251 - estayneranderson@gmail.com
                </p>
            </article>
            <section class="contact-section">

                <header class="contact-header">
                    <h1>White Water Rafting Company</h1>
                    <address>
                        123 Main River Street<br>
                        Kolob, California<br>
                        +1 999 999 9999<br>
                        <a href="mailto:info@whitewater.com">info@whitewater.com</a>
                    </address>
                </header>

                <div class="contact-layout">

                    <div class="map-box">
                        <div class="map-grid"></div>
                        <div class="map-pin"></div>
                    </div>


                    <form class="contact-form">
                        <div class="input-row">
                            <label for="name">Name</label>
                            <input type="text" id="name" placeholder="Placeholder">
                        </div>

                        <div class="input-row">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="Placeholder">
                        </div>

                        <div class="input-row">
                            <label>Message Purpose</label>
                            <div class="options">
                                <label><input type="radio" name="purpose" checked> General
                                    Inquiry</label>
                                <label><input type="radio" name="purpose"> Reservation
                                    Question</label>
                                <label><input type="radio" name="purpose"> Website
                                    Suggestion</label>
                            </div>
                        </div>

                        <div class="input-row">
                            <label for="msg">Message</label>
                            <textarea id="msg" placeholder="Type here"></textarea>
                        </div>

                        <div class="form-footer">
                            <label class="newsletter">
                                <input type="checkbox" checked> Please Subscribe me to the monthly
                                newsletter
                            </label>
                            <button type="submit">Get in Touch!</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </main>
    <footer class="main-footer">
        <p>©️2026 Huanuco Rafting - Anhelo Charle Yauri Valentin</p>
        <nav class="socialmedia">
            <a href=""><img src="images/facebook-square.webp" alt="Facebook"></a>
            <a href=""><img src="images/linkedin-square.webp" alt="LinkedIn"></a>
            <a href=""><img src="images/instagram-square.webp" alt="Instagram"></a>
        </nav>
    </footer>
</body>

</html>
